<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cloud Music Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Custom scrollbar for the playlist */
        .playlist-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .playlist-scroll::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }
        .playlist-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
        .playlist-scroll::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="bg-neutral-900 text-white min-h-screen flex items-center justify-center p-4 font-sans selection:bg-[#1db954] selection:text-white">

<div class="w-full max-w-md bg-neutral-800 p-6 rounded-2xl shadow-2xl border border-neutral-700/50">
    <h2 class="text-2xl font-bold text-[#1db954] text-center mb-6 flex items-center justify-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
        </svg>
        My Music Locker
    </h2>

    <!-- Upload Section -->
    <div class="border-2 border-dashed border-neutral-600 hover:border-neutral-500 transition-colors p-6 text-center rounded-xl mb-6 bg-neutral-900/50">
        <input type="file" id="file-input" accept="audio/*" class="hidden" onchange="updateFileName()">
        <label for="file-input" class="cursor-pointer block mb-3 text-sm text-neutral-400 hover:text-white transition-colors">
            <div class="flex flex-col items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-neutral-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                </svg>
                <span id="file-name-display">Click to select an audio file</span>
            </div>
        </label>
        <button id="upload-btn" onclick="uploadMusic()" class="bg-[#1db954] hover:bg-[#1ed760] text-black font-bold py-2 px-6 rounded-full transition-transform active:scale-95 shadow-lg shadow-[#1db954]/20 w-full sm:w-auto">
            Upload Song
        </button>
        <div id="status" class="text-xs text-neutral-400 mt-3 font-medium">Ready</div>
    </div>

    <!-- Player Box -->
    <div class="bg-neutral-900 p-4 rounded-xl mb-6 shadow-inner border border-neutral-800">
        <div id="now-playing" class="text-sm text-[#1db954] mb-3 font-semibold text-center truncate px-2">
            Select a song below
        </div>
        <audio id="audio-player" controls class="w-full h-10 outline-none"></audio>
    </div>

    <!-- Track List -->
    <div class="flex justify-between items-end mb-3 px-1">
        <h3 class="text-lg font-semibold text-neutral-200">Your Library</h3>
        <span id="track-count" class="text-xs text-neutral-500 font-medium">0 tracks</span>
    </div>
    <div id="playlist" class="playlist-scroll max-h-60 overflow-y-auto pr-2 flex flex-col gap-2">
        <div class="text-center text-sm text-neutral-500 py-4 animate-pulse">Loading songs...</div>
    </div>
</div>

<!-- Custom Toast Notification -->
<div id="toast" class="fixed bottom-6 right-6 px-4 py-3 rounded-lg shadow-2xl text-sm font-medium transform transition-all duration-300 translate-y-20 opacity-0 z-50 flex items-center gap-2">
    <span id="toast-icon"></span>
    <span id="toast-message">Message</span>
</div>

<script>
    // ⚠️ REPLACE THESE WITH YOUR ACTUAL SUPABASE CREDENTIALS
    const SUPABASE_URL = "YOUR_SUPABASE_URL";
    const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";
    const bucketName = 'music';

    const isDemoMode = SUPABASE_URL === "YOUR_SUPABASE_URL";

    let supabaseClient;
    if (!isDemoMode) {
        // The CDN script exposes a global 'supabase' object, so we rename ours to 'supabaseClient'
        supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    const audioPlayer = document.getElementById('audio-player');
    const nowPlaying = document.getElementById('now-playing');
    const playlistDiv = document.getElementById('playlist');
    const statusDiv = document.getElementById('status');
    const trackCountDiv = document.getElementById('track-count');
    const fileInput = document.getElementById('file-input');
    const fileNameDisplay = document.getElementById('file-name-display');

    // UI Helper: Update file name text when file selected
    function updateFileName() {
        if (fileInput.files.length > 0) {
            fileNameDisplay.textContent = fileInput.files[0].name;
            fileNameDisplay.classList.add('text-[#1db954]');
        } else {
            fileNameDisplay.textContent = "Click to select an audio file";
            fileNameDisplay.classList.remove('text-[#1db954]');
        }
    }

    // UI Helper: Show Custom Toast instead of alert()
    function showToast(message, type = 'error') {
        const toast = document.getElementById('toast');
        const msgSpan = document.getElementById('toast-message');
        const iconSpan = document.getElementById('toast-icon');
        
        msgSpan.textContent = message;
        
        if (type === 'error') {
            toast.className = "fixed bottom-6 right-6 px-4 py-3 rounded-lg shadow-2xl text-sm font-medium transform transition-all duration-300 z-50 flex items-center gap-2 bg-red-500/90 text-white backdrop-blur-sm";
            iconSpan.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';
        } else {
            toast.className = "fixed bottom-6 right-6 px-4 py-3 rounded-lg shadow-2xl text-sm font-medium transform transition-all duration-300 z-50 flex items-center gap-2 bg-[#1db954]/90 text-black backdrop-blur-sm";
            iconSpan.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>';
        }

        // Reset animation state
        toast.style.transform = "translateY(0)";
        toast.style.opacity = "1";

        setTimeout(() => {
            toast.style.transform = "translateY(20px)";
            toast.style.opacity = "0";
        }, 3000);
    }

    // Render the track list to the DOM
    function renderTracks(tracks) {
        playlistDiv.innerHTML = "";
        trackCountDiv.textContent = `${tracks.length} track${tracks.length !== 1 ? 's' : ''}`;

        if (tracks.length === 0) {
            playlistDiv.innerHTML = '<div class="text-center text-sm text-neutral-500 py-4">No songs uploaded yet.</div>';
            return;
        }

        tracks.forEach(file => {
            const item = document.createElement('div');
            item.className = 'group flex justify-between items-center p-3 bg-neutral-900/50 hover:bg-neutral-700/50 transition-colors rounded-lg border border-transparent hover:border-neutral-600';

            const title = document.createElement('div');
            title.className = 'cursor-pointer flex-grow truncate pr-4 text-sm font-medium text-neutral-300 group-hover:text-white transition-colors';
            
            // Format name slightly (remove extension if preferred, but we'll keep it as requested)
            title.innerHTML = `<span class="opacity-0 group-hover:opacity-100 text-[#1db954] mr-2 transition-opacity inline-block w-3">▶</span>${file.name}`;
            
            title.onclick = () => {
                nowPlaying.innerHTML = `Playing: <span class="text-white ml-1">${file.name}</span>`;
                audioPlayer.src = file.url;
                audioPlayer.play();
            };

            const dl = document.createElement('a');
            dl.className = 'opacity-0 group-hover:opacity-100 transition-opacity bg-neutral-800 hover:bg-neutral-600 text-neutral-300 px-3 py-1.5 rounded-md text-xs font-medium border border-neutral-700 flex items-center gap-1';
            dl.href = file.url;
            dl.download = file.name;
            dl.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
            `;
            dl.title = "Download";

            item.appendChild(title);
            item.appendChild(dl);
            playlistDiv.appendChild(item);
        });
    }

    // 1. Load songs from the cloud (or mock data) on startup
    async function loadLibrary() {
        playlistDiv.innerHTML = '<div class="text-center text-sm text-neutral-500 py-4 animate-pulse">Fetching library...</div>';
        
        if (isDemoMode) {
            // Provide mock data if real credentials aren't set yet
            setTimeout(() => {
                const mockData = [
                    { name: "Electronic_Beat_01.mp3", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
                    { name: "Chill_Vibes_Demo.mp3", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
                    { name: "Upbeat_Journey.mp3", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" }
                ];
                renderTracks(mockData);
                showToast("Demo mode: Using sample tracks", "success");
            }, 800);
            return;
        }

        try {
            const { data, error } = await supabaseClient.storage.from(bucketName).list('', {
                limit: 100,
                sortBy: { column: 'name', order: 'asc' }
            });

            if (error) throw error;

            const formattedData = data.map(file => {
                const { data: publicUrlData } = supabaseClient.storage.from(bucketName).getPublicUrl(file.name);
                return { name: file.name, url: publicUrlData.publicUrl };
            });

            renderTracks(formattedData);
        } catch (error) {
            playlistDiv.innerHTML = '<div class="text-center text-sm text-red-400 py-4">Error loading music. Check console.</div>';
            console.error(error);
        }
    }

    // 2. Upload song to the cloud
    async function uploadMusic() {
        if (fileInput.files.length === 0) {
            showToast("Please select a file first!", "error");
            return;
        }

        if (isDemoMode) {
            showToast("Cannot upload in Demo Mode. Add Supabase keys to your code.", "error");
            return;
        }

        const file = fileInput.files[0];
        statusDiv.innerHTML = `<span class="text-blue-400">Uploading "${file.name}"...</span>`;
        const uploadBtn = document.getElementById('upload-btn');
        uploadBtn.disabled = true;
        uploadBtn.classList.add('opacity-50', 'cursor-not-allowed');

        try {
            const { data, error } = await supabaseClient.storage
                .from(bucketName)
                .upload(file.name, file, { cacheControl: '3600', upsert: true });

            if (error) throw error;

            statusDiv.innerHTML = '<span class="text-[#1db954]">Upload successful!</span>';
            showToast("Song uploaded successfully!", "success");
            
            // Clear input and refresh
            fileInput.value = "";
            updateFileName();
            loadLibrary(); 
        } catch (error) {
            statusDiv.innerHTML = '<span class="text-red-500">Upload failed.</span>';
            showToast(error.message, "error");
        } finally {
            uploadBtn.disabled = false;
            uploadBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            setTimeout(() => { if(statusDiv.textContent.includes('successful')) statusDiv.textContent = 'Ready'; }, 3000);
        }
    }

    // Initialize
    loadLibrary();
</script>

</body>
</html>
